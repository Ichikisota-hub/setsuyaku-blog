<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせありがとうございます | くらしの節約ラボ</title>
  <!-- v2 -->
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #F5F7FB; }
    .thanks-wrap {
      max-width: 560px;
      margin: 80px auto;
      padding: 0 20px;
      text-align: center;
    }
    .thanks-icon { font-size: 64px; margin-bottom: 20px; }
    .thanks-title { font-size: 26px; font-weight: 800; color: #1B2A4E; margin-bottom: 12px; }
    .thanks-msg { font-size: 15px; color: #636e72; line-height: 1.8; margin-bottom: 32px; }
    .thanks-box {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      margin-bottom: 28px;
      text-align: left;
    }
    .thanks-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #1B2A4E; }
    .thanks-box ul { list-style: none; }
    .thanks-box li { font-size: 14px; color: #636e72; padding: 6px 0; border-bottom: 1px solid #F0F0F0; }
    .thanks-box li:last-child { border: none; }
    .btn-back {
      display: inline-block;
      background: #1B2A4E;
      color: white;
      padding: 14px 36px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo" style="text-decoration:none;">
      <span class="logo-main">🏠 くらしの節約ラボ</span>
      <span class="logo-sub">毎日の暮らしをお得に、すっきりと</span>
    </a>
  </div>
</header>

<div class="thanks-wrap">
  <div class="thanks-icon">✅</div>
  <h1 class="thanks-title">お問い合わせを<br>受け付けました</h1>
  <p class="thanks-msg">
    ご相談いただきありがとうございます。<br>
    内容を確認のうえ、<strong>24時間以内</strong>にご連絡いたします。<br>
    しばらくお待ちください。
  </p>
  <div class="thanks-box">
    <h3>📌 次のステップ</h3>
    <ul>
      <li>✉️ ご入力いただいた連絡先にご連絡します</li>
      <li>📋 現在のプランをもとに節約プランをご提案します</li>
      <li>🙅 勧誘・強引なセールスは一切ありません</li>
    </ul>
  </div>
  <a href="index.html" class="btn-back">トップページへ戻る</a>
</div>

<footer style="background:#1B2A4E;color:#b2bec3;text-align:center;padding:24px;font-size:12px;margin-top:60px;">
  <p>&copy; 2026 くらしの節約ラボ</p>
</footer>
</body>
</html>
